<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Semantic Shield Promo 440x280</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 440px;
      height: 280px;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 45%, #3b82f6 100%);
      color: #fff;
      display: flex;
      align-items: center;
      padding: 28px 32px;
      gap: 20px;
    }
    .shield {
      width: 88px;
      height: 88px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.15);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
    h1 {
      font-size: 28px;
      line-height: 1.15;
      margin-bottom: 8px;
    }
    p {
      font-size: 13px;
      line-height: 1.45;
      opacity: 0.95;
      max-width: 280px;
    }
  </style>
</head>
<body>
  <div class="shield">🛡</div>
  <div>
    <h1>Semantic Shield</h1>
    <p>Restore copy &amp; right-click. Block nuisance ads &amp; auto popups.</p>
  </div>
</body>
</html>

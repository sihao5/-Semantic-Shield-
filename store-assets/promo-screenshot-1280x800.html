<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Semantic Shield — Store Screenshot 1280×800</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1280px; height: 800px; overflow: hidden; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: linear-gradient(145deg, #e0e7ff 0%, #f8fafc 45%, #dbeafe 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 48px;
    }
    .browser {
      flex: 1;
      max-width: 720px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.15);
      overflow: hidden;
    }
    .browser-bar {
      background: #f1f5f9;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #e2e8f0;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.r { background: #f87171; }
    .dot.y { background: #fbbf24; }
    .dot.g { background: #4ade80; }
    .url {
      flex: 1; margin-left: 8px; background: #fff; border-radius: 6px;
      padding: 6px 12px; font-size: 12px; color: #64748b;
    }
    .page { padding: 32px; min-height: 280px; background: #fafafa; position: relative; }
    .page h2 { font-size: 20px; color: #1e293b; margin-bottom: 8px; }
    .page p { font-size: 14px; color: #64748b; line-height: 1.6; max-width: 420px; }
    .fake-modal {
      position: absolute; inset: 0; background: rgba(15,23,42,0.45);
      display: flex; align-items: center; justify-content: center;
    }
    .fake-modal-box {
      background: #fff; padding: 24px 32px; border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2); text-align: center;
    }
    .highlight-btn {
      position: absolute; top: 118px; right: 108px;
      width: 12px; height: 12px; border: 2px solid #ef4444;
      box-shadow: 0 0 0 2px rgba(239,68,68,0.3);
    }
    .highlight-label {
      position: absolute; top: 96px; right: 72px;
      background: #ef4444; color: #fff; font-size: 10px;
      padding: 2px 6px; border-radius: 4px; white-space: nowrap;
    }
    .popup {
      width: 400px; background: #f8fafc; border-radius: 12px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.2);
      overflow: hidden; flex-shrink: 0;
    }
    .popup-header {
      padding: 14px 16px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
    }
    .popup-header h1 { font-size: 16px; }
    .popup-header p { font-size: 12px; opacity: 0.92; margin-top: 4px; }
    .row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 16px; border-bottom: 1px solid #e2e8f0; font-size: 13px;
    }
    .row strong { display: block; font-size: 13px; }
    .row span { font-size: 11px; color: #64748b; }
    .sw { width: 40px; height: 22px; background: #2563eb; border-radius: 11px; position: relative; }
    .sw::after {
      content: ""; position: absolute; width: 16px; height: 16px;
      background: #fff; border-radius: 50%; right: 3px; top: 3px;
    }
    .btn-row { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
    .btn {
      padding: 9px; border-radius: 8px; font-size: 13px; font-weight: 600;
      text-align: center; border: none;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-secondary { background: #e2e8f0; color: #334155; }
    .brand {
      position: absolute; bottom: 24px; left: 48px;
      font-size: 13px; color: #64748b;
    }
    .brand strong { color: #1d4ed8; }
  </style>
</head>
<body>
  <div class="browser">
    <div class="browser-bar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <div class="url">https://example.com/article</div>
    </div>
    <div class="page">
      <h2>示例网页</h2>
      <p>语义盾牌解除复制限制、高亮隐蔽关闭按钮，并屏蔽自动弹窗与右下角广告。</p>
      <div class="fake-modal">
        <div class="fake-modal-box">
          <p style="font-size:14px;color:#334155">Subscribe to continue reading</p>
          <p style="font-size:11px;color:#94a3b8;margin-top:8px">× 假关闭按钮已被高亮标注</p>
        </div>
      </div>
      <span class="highlight-label">假关闭/隐藏</span>
      <span class="highlight-btn"></span>
    </div>
  </div>
  <div class="popup">
    <div class="popup-header">
      <h1>语义盾牌</h1>
      <p>还原文页自由操作</p>
    </div>
    <div class="row"><div><strong>解除操作限制</strong><span>恢复复制、粘贴与右键</span></div><div class="sw"></div></div>
    <div class="row"><div><strong>高亮假关闭按钮</strong><span>标注隐蔽关闭/取消按钮</span></div><div class="sw"></div></div>
    <div class="row"><div><strong>屏蔽广告与自动弹窗</strong><span>拦截无操作弹窗与浮窗广告</span></div><div class="sw"></div></div>
    <div class="btn-row">
      <div class="btn btn-primary">恢复页面交互</div>
      <div class="btn btn-secondary">重新扫描当前页面</div>
    </div>
  </div>
  <p class="brand"><strong>Semantic Shield</strong> · Firefox · Chrome · Edge · v1.4.3</p>
</body>
</html>

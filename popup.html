<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semantic Shield</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 400px;
      max-height: 580px;
      overflow-y: auto;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #1e293b;
      background: #f8fafc;
    }
    .header {
      padding: 14px 16px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header p { margin-top: 4px; font-size: 12px; opacity: 0.92; }
    .lang-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; background: #eef2ff; border-bottom: 1px solid #dbeafe; font-size: 12px;
    }
    .lang-row select { border: 1px solid #cbd5e1; border-radius: 6px; padding: 4px 8px; font-size: 12px; }
    .panel { padding: 8px 16px; }
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 0; border-bottom: 1px solid #e2e8f0;
    }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-label { flex: 1; padding-right: 12px; }
    .toggle-label strong { display: block; font-weight: 600; font-size: 13px; }
    .toggle-label span { display: block; margin-top: 2px; font-size: 11px; color: #64748b; line-height: 1.35; }
    .switch { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; cursor: pointer;
      background: #cbd5e1; border-radius: 24px;
    }
    .slider::before {
      content: ""; position: absolute; height: 18px; width: 18px;
      left: 3px; bottom: 3px; background: #fff; border-radius: 50%;
      transition: transform 0.2s;
    }
    .switch input:checked + .slider { background: #2563eb; }
    .switch input:checked + .slider::before { transform: translateX(20px); }
    .actions { padding: 0 16px 10px; display: flex; flex-direction: column; gap: 8px; }
    .btn {
      width: 100%; padding: 9px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer; background: #e2e8f0; color: #334155;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-sm { padding: 4px 8px; font-size: 11px; width: auto; }
    .blocklist {
      margin: 0 16px 12px; padding: 10px;
      background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
    }
    .blocklist-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .blocklist-header h2 { font-size: 12px; color: #1e293b; }
    .blocklist-actions { display: flex; gap: 6px; }
    .blocklist-list {
      max-height: 160px; overflow-y: auto;
      font-size: 11px; line-height: 1.4;
    }
    .blocklist-empty { color: #94a3b8; text-align: center; padding: 12px 0; }
    .block-item {
      padding: 8px; margin-bottom: 6px;
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px;
    }
    .block-item.restored { opacity: 0.55; }
    .block-item-type {
      display: inline-block; padding: 1px 6px; border-radius: 4px;
      background: #dbeafe; color: #1d4ed8; font-size: 10px; font-weight: 600;
    }
    .block-item-label { font-weight: 600; margin: 4px 0 2px; word-break: break-all; }
    .block-item-detail { color: #64748b; word-break: break-all; font-size: 10px; }
    .block-item-time { color: #94a3b8; font-size: 10px; margin-top: 4px; }
    .block-item-btns { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
    .help {
      margin: 0 16px 12px; padding: 10px;
      background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
      font-size: 11px; line-height: 1.55; color: #475569;
    }
    .help h2 { font-size: 12px; margin-bottom: 6px; color: #1e293b; }
    .help ol { padding-left: 18px; margin: 0; }
    .status { padding: 6px 16px 12px; font-size: 11px; color: #64748b; text-align: center; }
  </style>
</head>
<body>
  <header class="header">
    <h1 id="extensionTitle">语义盾牌</h1>
    <p id="subtitle">还原文页自由操作</p>
  </header>

  <div class="lang-row">
    <label for="langSelect" id="langLabel">语言</label>
    <select id="langSelect"><option value="zh">中文</option><option value="en">英文</option></select>
  </div>

  <section class="panel">
    <div class="toggle-row">
      <div class="toggle-label">
        <strong id="unlockTitle">解除操作限制</strong>
        <span id="unlockDesc"></span>
      </div>
      <label class="switch"><input type="checkbox" id="toggleUnlock" checked /><span class="slider"></span></label>
    </div>
    <div class="toggle-row">
      <div class="toggle-label">
        <strong id="highlightTitle">高亮假关闭按钮</strong>
        <span id="highlightDesc"></span>
      </div>
      <label class="switch"><input type="checkbox" id="toggleHighlight" checked /><span class="slider"></span></label>
    </div>
    <div class="toggle-row">
      <div class="toggle-label">
        <strong id="blockNuisanceTitle">屏蔽广告与自动弹窗</strong>
        <span id="blockNuisanceDesc"></span>
      </div>
      <label class="switch"><input type="checkbox" id="toggleBlockNuisance" checked /><span class="slider"></span></label>
    </div>
    <div class="toggle-row">
      <div class="toggle-label">
        <strong id="unsubscribeTitle">取消订阅助手</strong>
        <span id="unsubscribeDesc"></span>
      </div>
      <label class="switch"><input type="checkbox" id="toggleUnsubscribe" checked /><span class="slider"></span></label>
    </div>
  </section>

  <div class="actions">
    <button type="button" id="btnRestore" class="btn btn-primary">恢复页面交互</button>
    <button type="button" id="btnRescan" class="btn">重新扫描当前页面</button>
    <button type="button" id="btnManualBlock" class="btn">立即屏蔽当前页</button>
  </div>

  <section class="blocklist">
    <div class="blocklist-header">
      <h2 id="blocklistTitle">屏蔽管理清单</h2>
      <div class="blocklist-actions">
        <button type="button" id="btnBlocklistRefresh" class="btn btn-sm">刷新清单</button>
        <button type="button" id="btnBlocklistClear" class="btn btn-sm">清空清单</button>
      </div>
    </div>
    <div class="blocklist-list" id="blocklistContainer">
      <p class="blocklist-empty" id="blocklistEmpty">暂无屏蔽记录</p>
    </div>
  </section>

  <section class="help">
    <h2 id="helpTitle">功能说明</h2>
    <ol id="helpSteps"></ol>
  </section>

  <p class="status" id="statusText">正在加载…</p>

  <script src="browser-api.js"></script>
  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
